<!DOCTYPE html><html lang="uk">
<head>
<meta charset="UTF-8">
<title>Chicken Clicker PRO</title>
<style>
body{font-family:Arial;text-align:center;background:#0f172a;color:white}
button{margin:5px;padding:10px;border-radius:10px;border:none;cursor:pointer}
img{width:200px;cursor:pointer}
.tab{display:none}
.active{display:block}
</style>
</head>
<body><h1>🐔 Chicken Clicker PRO</h1><div>
<button onclick="openTab('main')">Головна</button>
<button onclick="openTab('shop')">Магазин</button>
<button onclick="openTab('inventory')">Інвентар</button>
<button onclick="openTab('cases')">Кейси</button>
<button onclick="openTab('promo')">Промо</button>
<button onclick="openTab('event')">Івент</button>
<button onclick="openTab('avatar')">Аватар</button>
</div><div id="main" class="tab active">
<h2>💰 <span id="coins">0</span></h2>
<h3>Рівень: <span id="level">1</span> | XP: <span id="xp">0</span>/1000</h3>
<img id="avatarImg" src="https://i.imgur.com/4AiXzf8.png" onclick="clickChicken()">
<p>Клік: <span id="clickPower">1</span></p>
</div><div id="shop" class="tab">
<h2>🛒 Магазин</h2>
<button onclick="upgradeClick()">Апгрейд кліку (100)</button>
<div id="weapons"></div>
</div><div id="inventory" class="tab">
<h2>🎒 Інвентар</h2>
<ul id="inventoryList"></ul>
</div><div id="cases" class="tab">
<h2>🎁 Кейси</h2>
<button onclick="openCase()">Відкрити (300)</button>
<p id="caseResult"></p>
</div><div id="promo" class="tab">
<h2>🎟️ Промокоди</h2>
<input id="promoInput">
<button onclick="usePromo()">OK</button>
<p id="promoMsg"></p>
</div><div id="event" class="tab">
<h2>🏆 Івент</h2>
<p id="eventReward"></p>
</div><div id="avatar" class="tab">
<h2>🎨 Аватар</h2>
<button onclick="setAvatar('https://i.imgur.com/4AiXzf8.png')">Курка</button>
<button onclick="setAvatar('https://i.imgur.com/Z6X6G6p.png')">Супер курка</button>
<button onclick="setAvatar('https://i.imgur.com/oYiTqum.png')">Золота</button>
</div><script>
let coins=0,clickPower=1,xp=0,level=1;
let inventory=[],usedPromos=[];

let weapons=[
['Пістолет',200],['SMG',400],['Дробовик',700],['АК-47',1200],['Снайперка',2000],
['Лазер',5000],['Плазма',10000],['Галактична',20000],['Міфічна',50000],['Бог',100000]
];

function save(){
localStorage.setItem('game',JSON.stringify({coins,clickPower,xp,level,inventory}))
}

function load(){
let data=JSON.parse(localStorage.getItem('game'));
if(data){coins=data.coins;clickPower=data.clickPower;xp=data.xp;level=data.level;inventory=data.inventory}
}

function updateUI(){
document.getElementById('coins').innerText=coins;
document.getElementById('clickPower').innerText=clickPower;
document.getElementById('xp').innerText=xp;
document.getElementById('level').innerText=level;
}

function clickChicken(){
coins+=clickPower;xp++;
if(xp>=1000){xp=0;level++;coins+=500}
updateUI();save();checkEvent();
}

function upgradeClick(){
if(coins>=100){coins-=100;clickPower++;updateUI();save()}
}

function createShop(){
let div=document.getElementById('weapons');
div.innerHTML='';
weapons.forEach(w=>{
let btn=document.createElement('button');
btn.innerText=w[0]+' ('+w[1]+')';
btn.onclick=()=>buyWeapon(w[0],w[1]);
div.appendChild(btn);
})
}

function buyWeapon(name,price){
if(coins>=price){coins-=price;inventory.push(name);updateInventory();updateUI();save()}
}

function updateInventory(){
let list=document.getElementById('inventoryList');
list.innerHTML='';
inventory.forEach(i=>{
let li=document.createElement('li');li.innerText=i;list.appendChild(li)
})
}

function openCase(){
if(coins>=300){
coins-=300;
let loot=['Рідкісна','Епічна','Легендарна','Міфічна'];
let item=loot[Math.floor(Math.random()*loot.length)];
inventory.push(item);
document.getElementById('caseResult').innerText='Випало: '+item;
updateInventory();updateUI();save()
}}

function usePromo(){
let code=promoInput.value;
if(usedPromos.includes(code))return promoMsg.innerText='Вже використано';
if(code=='Pro48k'||code=='ZCY11K'){coins+=1090;usedPromos.push(code);promoMsg.innerText='+1090'}
else promoMsg.innerText='❌';
updateUI();save();
}

function checkEvent(){
if(level==5)eventReward.innerText='+500 коїнів';
if(level==10)eventReward.innerText='Епік зброя';
if(level==20)eventReward.innerText='Міфічна зброя';
}

function setAvatar(src){document.getElementById('avatarImg').src=src}

function openTab(t){
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.getElementById(t).classList.add('active');
}

load();createShop();updateInventory();updateUI();
</script></body>
           </html>
