<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChickenGun Clicker PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="profile-bar">
            <div id="current-avatar">🐥</div>
            <div>
                <span id="player-nickname">Гравець</span>
                <button id="edit-nick-btn">✏️</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('game-screen')">Гра</button>
            <button class="tab-btn" onclick="openTab('shop-screen')">Магазин</button>
            <button class="tab-btn" onclick="openTab('inventory-screen')">Інвентар</button>
            <button class="tab-btn" onclick="openTab('market-screen')">Ринок</button>
            <button class="tab-btn" onclick="openTab('promo-screen')">Промо</button>
        </div>

        <div id="game-screen" class="tab-content active">
            <div class="score-container">
                <p>Монети: <span id="coins">0</span> 🪙</p>
                <p>За клік: +<span id="click-power">1</span></p>
            </div>
            <div class="chicken-stage">
                <button id="chicken-btn">🐥</button>
            </div>
        </div>

        <div id="shop-screen" class="tab-content">
            <h2>Магазин (Зброя та Одяг)</h2>
            <div class="shop-nav">
                <button onclick="filterShop('weapon')">⚔️ Зброя</button>
                <button onclick="filterShop('clothes')">👕 Одяг</button>
            </div>
            <div id="shop-items-list" class="items-grid"></div>
        </div>

        <div id="inventory-screen" class="tab-content">
            <h2>Твій Інвентар</h2>
            <div id="inventory-list" class="items-grid"></div>
        </div>

        <div id="market-screen" class="tab-content">
            <h2>Ринок гравців</h2>
            <div id="market-list" class="items-grid">
                <p style="color: #bdc3c7;">Завантаження товарів на ринку...</p>
            </div>
        </div>

        <div id="promo-screen" class="tab-content">
            <h2>Активація промокоду</h2>
            <input type="text" id="promo-input" placeholder="Введіть код (напр., CHICKEN10)">
            <button id="promo-btn" class="buy-btn" style="margin-top: 10px; width: 100%;">Активувати</button>
        </div>

    </div>

    <script src="script.js"></script>
    <script src="items.js"></script> <script src="profile.js"></script>
    <script src="market.js"></script>
</body>
                </html>
