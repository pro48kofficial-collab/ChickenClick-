<!DOCTYPE html><html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Clicker MOBILE</title>
<style>
body{margin:0;font-family:Arial;background:#020617;color:#0ff}
.container{display:flex;flex-direction:column;height:100vh}
.nav{display:flex;justify-content:space-around;background:#000;border-top:2px solid #0ff;padding:5px;position:fixed;bottom:0;width:100%}
.nav button{background:#000;color:#0ff;border:1px solid #0ff;border-radius:10px;padding:8px}
.content{flex:1;text-align:center;padding-bottom:70px}
img{width:150px;cursor:pointer}
.tab{display:none}
.active{display:block}
.neon{color:#0ff;text-shadow:0 0 5px #0ff,0 0 15px #0ff}
button{margin:5px;padding:10px;border-radius:10px;border:1px solid #0ff;background:#000;color:#0ff}
</style>
</head>
<body>
<div class="container"><div class="content"><div id="main" class="tab active">
<h2 class="neon">💰 <span id="coins">0</span></h2>
<h3>LVL <span id="level">1</span> | XP <span id="xp">0</span>/1000</h3>
<img id="avatarImg" src="https://via.placeholder.com/150" onclick="clickChicken()">
<p>Клік: <span id="clickPower">1</span></p>
</div><div id="shop" class="tab">
<h2 class="neon">🛒 Магазин</h2>
<button onclick="upgradeClick()">⚡ Апгрейд (100)</button>
<div id="weapons"></div>
</div><div id="inventory" class="tab">
<h2 class="neon">🎒 Інвентар</h2>
<ul id="inventoryList"></ul>
</div><div id="avatar" class="tab">
<h2 class="neon">🎨 Аватар</h2>
<img src="https://via.placeholder.com/150/ff0" onclick="setAvatar(this.src)">
<img src="https://via.placeholder.com/150/0ff" onclick="setAvatar(this.src)">
<img src="https://via.placeholder.com/150/f0f" onclick="setAvatar(this.src)">
</div></div><div class="nav">
<button onclick="openTab('main')">🐔</button>
<button onclick="openTab('shop')">🛒</button>
<button onclick="openTab('inventory')">🎒</button>
<button onclick="openTab('avatar')">🎨</button>
</div></div><script>
let coins=0,clickPower=1,xp=0,level=1;
let inventory=[];

let weapons=[
['🔫 Пістолет',200],['💥 SMG',400],['🔥 АК-47',1200],['🎯 Снайперка',2000]
];

function updateUI(){
document.getElementById('coins').innerText=coins;
document.getElementById('clickPower').innerText=clickPower;
document.getElementById('xp').innerText=xp;
document.getElementById('level').innerText=level;
}

function clickChicken(){
coins+=clickPower;
xp+=1;
if(xp>=1000){xp=0;level++}
updateUI();
}

function upgradeClick(){
if(coins>=100){coins-=100;clickPower++;updateUI()}
}

function createShop(){
let div=document.getElementById('weapons');
div.innerHTML='';
weapons.forEach(w=>{
let b=document.createElement('button');
b.innerText=w[0]+' ('+w[1]+')';
b.onclick=()=>buyWeapon(w[0],w[1]);
div.appendChild(b);
})
}

function buyWeapon(name,price){
if(coins>=price){coins-=price;inventory.push(name);updateInventory();updateUI()}
}

function updateInventory(){
let list=document.getElementById('inventoryList');
list.innerHTML='';
inventory.forEach(i=>{
let li=document.createElement('li');li.innerText=i;list.appendChild(li)
})
}

function setAvatar(src){
document.getElementById('avatarImg').src=src;
}

function openTab(t){
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.getElementById(t).classList.add('active');
}

createShop();updateInventory();updateUI();
</script></body>
        </html>
