<!DOCTYPE html><html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Clicker EVENT MAX</title>
<style>
body{margin:0;font-family:Arial;background:#020617;color:#0ff}
.container{display:flex;flex-direction:column;height:100vh}
.content{flex:1;text-align:center;padding-bottom:90px}
.nav{display:flex;justify-content:space-around;background:#000;border-top:2px solid #0ff;padding:5px;position:fixed;bottom:0;width:100%}
button{margin:5px;padding:10px;border-radius:10px;border:1px solid #0ff;background:#000;color:#0ff}
.tab{display:none}
.active{display:block}
</style>
</head>
<body>
<div class="container">
<div class="content"><div id="main" class="tab active">
<h2>💰 <span id="coins">0</span> | 🪙 Голда: <span id="gold">0</span></h2>
<h3>LVL <span id="level">1</span> | XP <span id="xp">0</span>/1000</h3>
<p>Клік: <span id="clickPower">1</span></p>
<button id="clickBtn">Тапнути 🐔</button>
</div><div id="event" class="tab">
<h2>⚡ Івент</h2>
<p>Голда: <span id="eventGold">0</span></p>
<p>Клік голди: <span id="goldClick">0.5</span></p>
<button id="goldClickBtn">Тапнути ⚡</button><h3>Апгрейди</h3>
<button onclick="upgradeGoldClick()">⚡ Апгрейд (50 голди)</button><h3>Предмети</h3>
<button onclick="buyEvent('skin')">🎨 Скін (50)</button>
<button onclick="buyEvent('mega')">💎 Мега скін (150)</button><h3>Кейси</h3>
<button onclick="eventCase('c1')">Sand of Time (100)</button>
<button onclick="eventCase('c2')">Fire Box (200)</button>
<button onclick="eventCase('c3')">Ice Box (300)</button>
<button onclick="eventCase('c4')">Galaxy Box (500)</button>
<button onclick="eventCase('c5')">Mythic Box (1000)</button><p id="eventResult"></p>
</div></div><div class="nav">
<button onclick="openTab('main')">🐔</button>
<button onclick="openTab('event')">⚡</button>
</div>
</div><script>
let coins=0,clickPower=1,xp=0,level=1;
let gold=0,goldClick=0.5;
let inventory=[];

function save(){
localStorage.setItem('game',JSON.stringify({coins,clickPower,xp,level,inventory,gold,goldClick}))
}

function load(){
let d=JSON.parse(localStorage.getItem('game'));
if(d){
coins=d.coins||0;
clickPower=d.clickPower||1;
xp=d.xp||0;
level=d.level||1;
inventory=d.inventory||[];
gold=d.gold||0;
goldClick=d.goldClick||0.5;
}
}

function updateUI(){
document.getElementById('coins').innerText=coins;
document.getElementById('xp').innerText=xp;
document.getElementById('level').innerText=level;
document.getElementById('clickPower').innerText=clickPower;
document.getElementById('gold').innerText=gold;
document.getElementById('eventGold').innerText=gold;
document.getElementById('goldClick').innerText=goldClick;
}

function clickChicken(){
coins+=clickPower;
xp+=clickPower;
if(xp>=1000){xp-=1000;level++;}
updateUI();save();
}

function goldClickFunc(){
gold+=goldClick;
updateUI();save();
}

function upgradeGoldClick(){
if(gold>=50){gold-=50;goldClick+=0.5;updateUI();save();}
}

function buyEvent(type){
let res='';
if(type==='skin'){if(gold<50)return;gold-=50;res='🎨 Скін';}
if(type==='mega'){if(gold<150)return;gold-=150;res='💎 Мега скін';}
inventory.push(res);
document.getElementById('eventResult').innerText='Отримано: '+res;
updateUI();save();
}

function eventCase(type){
let res='';
if(type==='c1'){if(gold<100)return;gold-=100;res='⏳ Sand of Time';}
if(type==='c2'){if(gold<200)return;gold-=200;res='🔥 Fire';}
if(type==='c3'){if(gold<300)return;gold-=300;res='❄️ Ice';}
if(type==='c4'){if(gold<500)return;gold-=500;res='🌌 Galaxy';}
if(type==='c5'){if(gold<1000)return;gold-=1000;res='👑 Mythic';}
inventory.push(res);
document.getElementById('eventResult').innerText='Випало: '+res;
updateUI();save();
}

function openTab(t){
document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
document.getElementById(t).classList.add('active');
}

// EVENTS
document.getElementById('clickBtn').addEventListener('click',clickChicken);
document.getElementById('goldClickBtn').addEventListener('click',goldClickFunc);

load();updateUI();
</script></body>
                                                           </html>
